<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nöbet Çizelgesi Pro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:#2a3040;
    --accent:#3b82f6;--accent2:#22d3ee;--success:#10b981;--danger:#ef4444;--warn:#f59e0b;
    --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
    --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
  .app{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:20px}
  header{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .logo{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
  header h1{font-family:var(--mono);font-size:18px;font-weight:600}
  .hbadge{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--accent2);background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);padding:4px 10px;border-radius:20px}
  
  /* Admin Styles */
  .admin-only { display: none !important; }
  body.is-admin .admin-only { display: inline-flex !important; }
  body.is-admin .hbadge { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,0.1); }

  .tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content}
  .tab{padding:8px 20px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:0.2s}
  .tab.active{background:var(--accent);color:white}
  .panel{display:none}.panel.active{display:block}

  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .btn-nav{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;width:36px;height:36px;cursor:pointer}
  .btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn-o{background:transparent;border:1px solid var(--border);color:var(--text2)}
  .btn-danger{border-color:var(--danger);color:var(--danger);background:transparent;border:1px solid}
  
  .twrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);background:var(--surface)}
  .mtable{border-collapse:collapse;font-size:11px;width:100%}
  .mtable th, .mtable td{padding:10px 5px;border-bottom:1px solid var(--border);border-right:1px solid rgba(42,48,64,0.3);text-align:center}
  .td-left{text-align:left!important;font-family:var(--mono);padding-left:15px!important;background:var(--surface2)!important;position:sticky;left:0}
  .pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;border:1px solid rgba(255,255,255,0.1)}

  /* Modal Edit */
  #editModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;padding:20px;overflow-y:auto}
  .modal-content{background:var(--surface);max-width:800px;margin:20px auto;padding:20px;border-radius:15px;border:1px solid var(--border)}
  .edit-input{background:var(--bg);border:1px solid var(--border);color:white;padding:5px;width:100%;border-radius:4px}
  #jsonOutput{width:100%;height:150px;background:#000;color:var(--success);font-family:var(--mono);font-size:10px;margin-top:10px;padding:10px;border-radius:8px}
</style>
</head>
<body>

<div class="app">
<header>
  <div class="logo">🛡</div>
  <div>
    <h1>NÖBET ÇİZELGESİ</h1>
    <p id="headerSub">Yükleniyor...</p>
  </div>
  <div style="margin-left: auto; display: flex; gap: 8px;">
    <button class="btn btn-o" id="adminBtn" onclick="toggleAdmin()">🔑 Admin</button>
    <div class="hbadge" id="hbadge">Bağlanıyor...</div>
  </div>
</header>

<div class="tabs" id="tabBar" style="display:none">
  <button class="tab active" onclick="showTab('aylik',this)">📅 Aylık Çizelge</button>
  <button class="tab" onclick="showTab('kisi',this)">👤 Kişi Bazlı</button>
</div>

<div id="panel-aylik" class="panel active">
  <div class="toolbar">
    <button class="btn-nav" onclick="changeMonth(-1)">←</button>
    <div id="monthLabel" style="font-family:var(--mono);min-width:140px;text-align:center">---</div>
    <button class="btn-nav" onclick="changeMonth(1)">→</button>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn btn-danger admin-only" onclick="openEditor()">✍ Düzenle & Güncelle</button>
      <button class="btn btn-o" onclick="window.print()">🖨 Yazdır</button>
    </div>
  </div>
  <div id="legend" style="display:flex;gap:10px;margin-bottom:10px;font-size:10px;flex-wrap:wrap"></div>
  <div class="twrap">
    <table class="mtable"><thead id="mThead"></thead><tbody id="mTbody"></tbody></table>
  </div>
</div>

<div id="panel-kisi" class="panel">
  <input class="btn-o" id="kSearch" placeholder="🔍 İsim ara..." oninput="renderKisi()" style="padding:8px;width:250px;margin-bottom:15px;border-radius:8px">
  <div class="twrap">
    <table class="mtable"><thead id="kThead"></thead><tbody id="kTbody"></tbody></table>
  </div>
</div>
</div>

<div id="editModal">
  <div class="modal-content">
    <h2 style="margin-bottom:15px">Veri Düzenleyici</h2>
    <p style="font-size:12px;color:var(--text2);margin-bottom:10px">İsimleri değiştirin ve alttaki JSON kodunu kopyalayıp GitHub'daki nobet_data.json dosyasına yapıştırın.</p>
    <div id="editorFields" style="max-height:400px;overflow-y:auto"></div>
    <button class="btn btn-danger" style="width:100%;margin-top:20px" onclick="generateNewJSON()">JSON KODUNU ÜRET</button>
    <textarea id="jsonOutput" readonly placeholder="Kod burada görünecek..."></textarea>
    <button class="btn btn-o" style="width:100%;margin-top:10px" onclick="document.getElementById('editModal').style.display='none'">Kapat</button>
  </div>
</div>

<script>
const ADMIN_HASH = "240be518ebb0c4c3912a7092121d5922355443f66f5f012001479836796451a9"; // admin123
let D = null; let monthOffset = 0;
const MONTH_TR = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const DAY_TR = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
const COLORS = [{t:'#60a5fa',bg:'rgba(96,165,250,0.15)'},{t:'#34d399',bg:'rgba(52,211,153,0.15)'},{t:'#a78bfa',bg:'rgba(167,139,250,0.15)'},{t:'#fb923c',bg:'rgba(251,146,60,0.15)'},{t:'#f472b6',bg:'rgba(244,114,182,0.15)'}];

async function hash(s) {
    const utf8 = new TextEncoder().encode(s);
    const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function toggleAdmin() {
    if(localStorage.getItem('is_admin') === 'true') { localStorage.removeItem('is_admin'); location.reload(); return; }
    const p = prompt("Şifre:");
    if(await hash(p) === ADMIN_HASH) { localStorage.setItem('is_admin', 'true'); location.reload(); }
    else alert("Hatalı!");
}

window.onload = async () => {
    if(localStorage.getItem('is_admin') === 'true') document.body.classList.add('is-admin');
    const res = await fetch('nobet_data.json?v=' + Date.now());
    D = await res.json();
    D.startDate = new Date(D.baslamaTarihi + 'T00:00:00');
    const now = new Date();
    monthOffset = (now.getFullYear()-D.startDate.getFullYear())*12+(now.getMonth()-D.startDate.getMonth());
    document.getElementById('tabBar').style.display = 'flex';
    document.getElementById('hbadge').textContent = document.body.classList.contains('is-admin') ? "YÖNETİCİ" : "PERSONEL";
    if(document.body.classList.contains('is-admin')) document.getElementById('adminBtn').textContent = "Çıkış";
    renderMonthly();
};

function getSchedule(date) {
    const d = new Date(date); const dow = d.getDay() === 0 ? 6 : d.getDay() - 1;
    if(dow >= D.workDays) return [];
    const diff = Math.floor((d - D.startDate) / (7 * 86400000));
    let tWeeks = (D.tatiller || []).filter(t => new Date(t.pazartesi) < d).reduce((a,b) => a + b.haftaSayisi, 0);
    const rw = diff - tWeeks;
    for(let t of (D.tatiller || [])) {
        let tStart = new Date(t.pazartesi + 'T00:00:00');
        let tEnd = new Date(tStart.getTime() + t.haftaSayisi * 7 * 86400000);
        if(d >= tStart && d < tEnd) return null;
    }
    return (D.gunNobetcileri[dow] || []).map((name, i) => ({
        name, bIdx: ((i + rw) % D.bolgeCount + D.bolgeCount) % D.bolgeCount, slot: i
    })).filter(x => x.name);
}

function renderMonthly() {
    const view = new Date(D.startDate.getFullYear(), D.startDate.getMonth() + monthOffset, 1);
    document.getElementById('monthLabel').textContent = `${MONTH_TR[view.getMonth()]} ${view.getFullYear()}`;
    const dim = new Date(view.getFullYear(), view.getMonth() + 1, 0).getDate();
    
    let th = `<tr><th class="td-left">BÖLGELER</th>`;
    for(let i=1; i<=dim; i++) {
        let day = new Date(view.getFullYear(), view.getMonth(), i);
        let dow = day.getDay() === 0 ? 6 : day.getDay() - 1;
        th += `<th style="${dow>=5?'opacity:0.3':''}">${i}<br><small>${DAY_TR[dow]}</small></th>`;
    }
    document.getElementById('mThead').innerHTML = th + '</tr>';

    let tb = '';
    for(let b=0; b<D.bolgeCount; b++) {
        const c = COLORS[b % COLORS.length];
        tb += `<tr><td class="td-left" style="color:${c.t}">${D.bolgeNames[b]}</td>`;
        for(let i=1; i<=dim; i++) {
            const sch = getSchedule(new Date(view.getFullYear(), view.getMonth(), i));
            if(sch === null) tb += `<td style="color:var(--warn);font-size:9px">TATİL</td>`;
            else {
                const p = sch.find(x => x.bIdx === b);
                tb += `<td>${p ? `<span class="pill" style="background:${c.bg};color:${c.t}">${p.name.split(' ')[0]}</span>` : '·'}</td>`;
            }
        }
        tb += '</tr>';
    }
    document.getElementById('mTbody').innerHTML = tb;
}

function openEditor() {
    document.getElementById('editModal').style.display = 'block';
    let html = '';
    for(let d=0; d<D.workDays; d++) {
        html += `<h4 style="margin:10px 0;color:var(--accent)">${DAY_TR[d]} Günü</h4>`;
        D.gunNobetcileri[d].forEach((name, i) => {
            html += `<input class="edit-input" data-day="${d}" data-idx="${i}" value="${name || ''}" placeholder="Personel ${i+1}">`;
        });
    }
    document.getElementById('editorFields').innerHTML = html;
}

function generateNewJSON() {
    const inputs = document.querySelectorAll('.edit-input');
    inputs.forEach(inp => {
        const d = inp.dataset.day; const i = inp.dataset.idx;
        D.gunNobetcileri[d][i] = inp.value;
    });
    const cleanJSON = JSON.parse(JSON.stringify(D));
    delete cleanJSON.startDate; // Geçici alanı sil
    document.getElementById('jsonOutput').value = JSON.stringify(cleanJSON, null, 2);
    alert("JSON üretildi! Alttaki siyah kutudan kopyalayıp GitHub'daki dosyanın içine yapıştırın.");
}

function showTab(t, b) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.getElementById('panel-'+t).classList.add('active');
    b.classList.add('active');
}
function changeMonth(s) { monthOffset += s; renderMonthly(); }
</script>
</body>
</html>
