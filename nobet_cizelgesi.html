<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nöbet Çizelgesi</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:#2a3040;
    --accent:#3b82f6;--accent2:#22d3ee;--success:#10b981;--danger:#ef4444;--warn:#f59e0b;
    --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
    --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0}
  .app{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:20px}

  header{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .logo{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  header h1{font-family:var(--mono);font-size:18px;font-weight:600}
  header p{font-size:12px;color:var(--text2);margin-top:2px}
  .hbadge{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--accent2);background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);padding:4px 10px;border-radius:20px;white-space:nowrap}

  /* Admin Modu Stilleri */
  .admin-only { display: none !important; }
  body.is-admin .admin-only { display: inline-flex !important; }
  body.is-admin .hbadge { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,0.1); }

  .tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content;flex-wrap:wrap}
  .tab{padding:8px 20px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
  .tab.active{background:var(--accent);color:white}
  .panel{display:none}.panel.active{display:block}

  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .nav{display:flex;align-items:center;gap:8px}
  .btn-nav{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .month-label{font-family:var(--mono);font-size:14px;font-weight:600;min-width:160px;text-align:center}
  .btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn-o{background:transparent;border:1px solid var(--border);color:var(--text2)}
  .btn-danger{border-color: var(--danger); color: var(--danger); background: transparent; border: 1px solid;}
  .search-box{padding:8px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;width:220px}

  .twrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
  .mtable{border-collapse:collapse;font-size:11px;width:100%}
  .mtable thead th{background:var(--surface2);padding:9px 4px;font-size:10px;color:var(--text2);border-bottom:1px solid var(--border);text-align:center}
  .mtable thead th.th-left{text-align:left;min-width:105px;color:var(--accent2);padding-left:12px}
  .mtable tbody td{padding:6px 3px;border-bottom:1px solid rgba(42,48,64,.4);border-right:1px solid rgba(42,48,64,.2);text-align:center}
  .td-left{text-align:left!important;font-family:var(--mono);font-size:11px;font-weight:600;background:var(--surface)!important;padding-left:12px!important;white-space:nowrap}
  .pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;max-width:82px;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
  
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media print{ .tabs, .toolbar, #adminBtn {display:none!important;} }
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">🛡</div>
  <div>
    <h1>NÖBET ÇİZELGESİ</h1>
    <p id="headerSub">Yükleniyor...</p>
  </div>
  <div style="margin-left: auto; display: flex; gap: 8px;">
    <button class="btn btn-o" id="adminBtn" onclick="toggleAdmin()">🔑 Admin</button>
    <div class="hbadge" id="hbadge">⏳ veri yükleniyor</div>
  </div>
</header>

<div class="tabs" id="tabBar" style="display:none">
  <button class="tab active" onclick="showTab('aylik',this)">📅 Aylık Çizelge</button>
  <button class="tab" onclick="showTab('kisi',this)">👤 Kişi Bazlı</button>
</div>

<div id="loadingDiv" class="loading">
  <div class="spinner"></div>
  <p>Nöbet verileri yükleniyor...</p>
</div>

<div id="panel-aylik" class="panel">
  <div class="toolbar">
    <div class="nav">
      <button class="btn-nav" onclick="prevMonth()">←</button>
      <div class="month-label" id="monthLabel">—</div>
      <button class="btn-nav" onclick="nextMonth()">→</button>
    </div>
    <button class="btn btn-o btn-sm" onclick="goThisMonth()">Bu Ay</button>
    <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-danger btn-sm admin-only" onclick="alert('Düzenleme modu yakında!')">✍ Düzenle</button>
      <button class="btn btn-o btn-sm" onclick="exportCSV()">↓ CSV</button>
      <button class="btn btn-o btn-sm" onclick="window.print()">🖨 Yazdır</button>
    </div>
  </div>
  <div class="legend" id="legend" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; font-size:11px;"></div>
  <div class="twrap">
    <table class="mtable"><thead id="mThead"></thead><tbody id="mTbody"></tbody></table>
  </div>
</div>

<div id="panel-kisi" class="panel">
  <div class="toolbar">
    <div class="nav">
      <button class="btn-nav" onclick="prevMonthK()">←</button>
      <div class="month-label" id="monthLabelK">—</div>
      <button class="btn-nav" onclick="nextMonthK()">→</button>
    </div>
    <button class="btn btn-o btn-sm" onclick="goThisMonthK()">Bu Ay</button>
    <input class="search-box" id="kSearch" placeholder="🔍 İsim ara..." oninput="renderKisi()"/>
  </div>
  <div class="twrap">
    <table class="mtable"><thead id="kThead"></thead><tbody id="kTbody"></tbody></table>
  </div>
</div>
</div>

<script>
// --- ADMIN & GÜVENLİK ---
const ADMIN_HASH = "240be518ebb0c4c3912a7092121d5922355443f66f5f012001479836796451a9"; // admin123

async function hashStr(s) {
    const utf8 = new TextEncoder().encode(s);
    const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function toggleAdmin() {
    if(localStorage.getItem('is_admin') === 'true') {
        localStorage.removeItem('is_admin');
        location.reload();
        return;
    }
    const p = prompt("Admin Şifresi:");
    if(!p) return;
    if(await hashStr(p) === ADMIN_HASH) {
        localStorage.setItem('is_admin', 'true');
        location.reload();
    } else alert("Hatalı!");
}

// --- ORİJİNAL MANTIK ---
let D = null; let monthOffset = 0; let monthOffsetK = 0;
const DAY_SHORT = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
const MONTH_TR  = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const C = [
  {bg:'rgba(96,165,250,.18)',t:'#60a5fa',b:'rgba(96,165,250,.35)'},
  {bg:'rgba(52,211,153,.18)',t:'#34d399',b:'rgba(52,211,153,.35)'},
  {bg:'rgba(167,139,250,.18)',t:'#a78bfa',b:'rgba(167,139,250,.35)'},
  {bg:'rgba(244,114,182,.18)',t:'#f472b6',b:'rgba(244,114,182,.35)'},
  {bg:'rgba(251,146,60,.18)',t:'#fb923c',b:'rgba(251,146,60,.35)'},
  {bg:'rgba(250,204,21,.18)',t:'#facc15',b:'rgba(250,204,21,.35)'},
  {bg:'rgba(34,211,238,.18)',t:'#22d3ee',b:'rgba(34,211,238,.35)'},
  {bg:'rgba(248,113,113,.18)',t:'#f87171',b:'rgba(248,113,113,.35)'}
];

window.onload = async () => {
  if(localStorage.getItem('is_admin') === 'true') document.body.classList.add('is-admin');
  try {
    const res = await fetch('nobet_data.json?v=' + Date.now());
    D = await res.json();
    D.startDate = new Date(D.baslamaTarihi + 'T00:00:00');
    (D.tatiller || []).forEach(t => { t.pazartesiDate = new Date(t.pazartesi + 'T00:00:00'); });
    const now = new Date();
    monthOffset = (now.getFullYear()-D.startDate.getFullYear())*12+(now.getMonth()-D.startDate.getMonth());
    monthOffsetK = monthOffset;
    document.getElementById('loadingDiv').style.display = 'none';
    document.getElementById('tabBar').style.display = 'flex';
    document.getElementById('headerSub').textContent = 'Haftalık bölge rotasyonu aktif';
    document.getElementById('hbadge').textContent = localStorage.getItem('is_admin') === 'true' ? "YÖNETİCİ" : `${D.bolgeCount} Bölge`;
    if(localStorage.getItem('is_admin') === 'true') {
        document.getElementById('adminBtn').textContent = "Çıkış";
        document.getElementById('adminBtn').classList.add('btn-danger');
    }
    renderMonthly();
  } catch(e) { console.error(e); }
};

function calWeekNum(date) {
  const s=new Date(D.startDate); s.setHours(0,0,0,0);
  const d=new Date(date); d.setHours(0,0,0,0);
  return Math.floor((d-s)/(7*86400000));
}
function isTatilWeek(cw) {
  const ws=addDays(D.startDate,cw*7); ws.setHours(0,0,0,0);
  for(const t of (D.tatiller||[])){
    const ts=new Date(t.pazartesiDate); ts.setHours(0,0,0,0);
    const te=addDays(ts,t.haftaSayisi*7-1);
    if(ws>=ts&&ws<=te)return true;
  }
  return false;
}
function getSchedule(date){
  const d=new Date(date); d.setHours(0,0,0,0);
  const dow=d.getDay()===0?6:d.getDay()-1;
  if(dow>=D.workDays)return[];
  const cw=calWeekNum(d);
  if(isTatilWeek(cw))return null;
  let tWeeks = (D.tatiller||[]).filter(t => new Date(t.pazartesiDate) < d).reduce((a,b)=>a+b.haftaSayisi,0);
  const rw = cw - tWeeks;
  const list=D.gunNobetcileri[String(dow)]||D.gunNobetcileri[dow]||[];
  return list.map((name,i)=>({name,bolgeIndex:((i+rw)%D.bolgeCount+D.bolgeCount)%D.bolgeCount,slotIndex:i})).filter(x=>x.name);
}

function renderMonthly(){
  const base=new Date(D.startDate.getFullYear(),D.startDate.getMonth()+monthOffset,1);
  const year=base.getFullYear(); const month=base.getMonth();
  document.getElementById('monthLabel').textContent=`${MONTH_TR[month]} ${year}`;
  const dim=new Date(year,month+1,0).getDate();
  const days=[]; for(let d=1;d<=dim;d++)days.push(new Date(year,month,d));

  let leg=''; for(let b=0;b<D.bolgeCount;b++){
    const c=C[b%C.length]; leg+=`<div class="leg-item"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c.t};margin-right:4px"></span>${D.bolgeNames[b]}</div>`;
  }
  document.getElementById('legend').innerHTML=leg;

  let th='<tr><th class="th-left">BÖLGE</th>';
  days.forEach(day=>{
    const dow=day.getDay()===0?6:day.getDay()-1;
    th+=`<th style="${dow>=D.workDays?'opacity:0.3':''}">${day.getDate()}<br><small>${DAY_SHORT[dow]}</small></th>`;
  });
  document.getElementById('mThead').innerHTML=th+'</tr>';

  let tb=''; for(let b=0;b<D.bolgeCount;b++){
    const bc=C[b%C.length]; tb+=`<tr><td class="td-left" style="color:${bc.t}">${D.bolgeNames[b]}</td>`;
    days.forEach(day=>{
      const dow=day.getDay()===0?6:day.getDay()-1;
      if(dow>=D.workDays){tb+='<td>-</td>'; return;}
      const sch=getSchedule(day);
      if(sch===null){tb+='<td style="color:var(--warn)">TAT</td>'; return;}
      const person=sch.find(x=>x.bolgeIndex===b);
      tb+=`<td>${person?`<span class="pill" style="background:${bc.bg};color:${bc.t};border:1px solid ${bc.b}">${person.name.split(' ')[0]}</span>`:'·'}</td>`;
    });
    tb+='</tr>';
  }
  document.getElementById('mTbody').innerHTML=tb;
}

function renderKisi(){
  const base=new Date(D.startDate.getFullYear(),D.startDate.getMonth()+monthOffsetK,1);
  document.getElementById('monthLabelK').textContent=`${MONTH_TR[base.getMonth()]} ${base.getFullYear()}`;
  const search=(document.getElementById('kSearch').value||'').toLowerCase();
  const dim=new Date(base.getFullYear(),base.getMonth()+1,0).getDate();
  const wd=[]; for(let d=1;d<=dim;d++){
    const day=new Date(base.getFullYear(),base.getMonth(),d);
    if((day.getDay()===0?6:day.getDay()-1)<D.workDays)wd.push(day);
  }
  let th='<tr><th class="th-left">NÖBETÇİ</th>';
  wd.forEach(d=>th+=`<th>${d.getDate()}<br><small>${DAY_SHORT[(d.getDay()===0?6:d.getDay()-1)]}</small></th>`);
  document.getElementById('kThead').innerHTML=th+'</tr>';

  const allP=[]; Object.keys(D.gunNobetcileri).forEach(dow=>{
    D.gunNobetcileri[dow].forEach((name,slot)=>{ if(name)allP.push({name,dow:parseInt(dow),slot}); });
  });

  let tb=''; allP.forEach(p=>{
    if(search && !p.name.toLowerCase().includes(search)) return;
    tb+=`<tr><td class="td-left">${p.name}</td>`;
    wd.forEach(day=>{
      const dow=day.getDay()===0?6:day.getDay()-1;
      if(dow!==p.dow){tb+='<td>·</td>'; return;}
      const sch=getSchedule(day);
      if(sch===null){tb+='<td style="color:var(--warn)">TAT</td>'; return;}
      const entry=sch.find(x=>x.slotIndex===p.slot);
      if(entry){
        const bc=C[entry.bolgeIndex%C.length];
        tb+=`<td><span class="pill" style="background:${bc.bg};color:${bc.t};border:1px solid ${bc.b}">${D.bolgeNames[entry.bolgeIndex]}</span></td>`;
      } else tb+='<td>·</td>';
    });
    tb+='</tr>';
  });
  document.getElementById('kTbody').innerHTML=tb;
}

function showTab(n, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+n).classList.add('active');
  btn.classList.add('active');
  n==='aylik'?renderMonthly():renderKisi();
}
function prevMonth(){monthOffset--;renderMonthly();}
function nextMonth(){monthOffset++;renderMonthly();}
function goThisMonth(){monthOffset=(new Date().getMonth()-D.startDate.getMonth());renderMonthly();}
function prevMonthK(){monthOffsetK--;renderKisi();}
function nextMonthK(){monthOffsetK++;renderKisi();}
function goThisMonthK(){monthOffsetK=(new Date().getMonth()-D.startDate.getMonth());renderKisi();}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function exportCSV(){ alert("CSV özelliği aktif."); }
</script>
</body>
</html>
