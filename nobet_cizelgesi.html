<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nöbet Çizelgesi</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:#2a3040;
    --accent:#3b82f6;--accent2:#22d3ee;--success:#10b981;--danger:#ef4444;--warn:#f59e0b;
    --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
    --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0}
  .app{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:20px}

  /* HEADER */
  header{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .logo{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  header h1{font-family:var(--mono);font-size:18px;font-weight:600}
  header p{font-size:12px;color:var(--text2);margin-top:2px}
  .hbadge{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--accent2);background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);padding:4px 10px;border-radius:20px;white-space:nowrap}

  /* TABS */
  .tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content;flex-wrap:wrap}
  .tab{padding:8px 20px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
  .tab.active{background:var(--accent);color:white}
  .tab:hover:not(.active){background:var(--surface2);color:var(--text)}
  .panel{display:none}.panel.active{display:block}

  /* TOOLBAR */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .nav{display:flex;align-items:center;gap:8px}
  .btn-nav{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s;flex-shrink:0}
  .btn-nav:hover{border-color:var(--accent);color:var(--accent)}
  .month-label{font-family:var(--mono);font-size:14px;font-weight:600;min-width:160px;text-align:center}
  .btn{padding:8px 16px;border-radius:8px;border:none;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
  .btn-o{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-o:hover{border-color:var(--accent);color:var(--accent)}
  .btn-sm{padding:6px 13px;font-size:12px}

  /* ARAMA */
  .search-box{padding:8px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .2s;width:220px}
  .search-box:focus{border-color:var(--accent)}

  /* LEGEND */
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
  .leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

  /* TABLO */
  .twrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
  .mtable{border-collapse:collapse;font-size:11px;width:100%}
  .mtable thead th{background:var(--surface2);padding:9px 4px;font-family:var(--mono);font-size:10px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;text-align:center}
  .mtable thead th.th-left{text-align:left;min-width:105px;color:var(--accent2);padding-left:12px}
  .mtable thead th.th-we{opacity:.35}
  .mtable thead th.th-today{color:var(--accent)!important}
  .mtable thead th.th-tatil{color:var(--warn)!important}
  .mtable tbody td{padding:6px 3px;border-bottom:1px solid rgba(42,48,64,.4);border-right:1px solid rgba(42,48,64,.2);text-align:center;vertical-align:middle}
  .mtable tbody tr:last-child td{border-bottom:none}
  .mtable tbody td:last-child{border-right:none}
  .mtable tbody tr:hover td{background:rgba(28,32,48,.5)}
  .td-left{text-align:left!important;font-family:var(--mono);font-size:11px;font-weight:600;background:var(--surface)!important;padding-left:12px!important;white-space:nowrap}
  .td-we{background:rgba(255,255,255,.01)!important}
  .td-tatil{background:rgba(245,158,11,.07)!important}
  .td-today{background:rgba(59,130,246,.08)!important}
  .pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;max-width:82px;overflow:hidden;text-overflow:ellipsis;cursor:default;line-height:1.5}
  .tatil-lbl{font-size:9px;color:var(--warn);font-family:var(--mono)}
  .empty-dot{color:var(--text3);font-size:8px}

  /* LOADING */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading p{color:var(--text2);font-size:14px}

  /* HATA */
  .error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:24px;text-align:center;color:var(--danger)}
  .error-box h3{font-size:16px;margin-bottom:8px}
  .error-box p{font-size:13px;color:var(--text2);line-height:1.7}
  .error-box code{background:var(--surface2);padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:12px;color:var(--accent2)}

  /* KİŞİ ARAMA highlight */
  .highlight{background:rgba(59,130,246,.2)!important;border-color:var(--accent)!important}

  @media(max-width:600px){
    header h1{font-size:15px}
    .month-label{min-width:130px;font-size:13px}
    .search-box{width:160px}
  }

  /* A4 BASKI */
  @media print{
    @page{size:A4 landscape;margin:7mm}
    body{background:white!important;color:black!important}
    body::before{display:none}
    .app{padding:0;max-width:100%}
    header{border-bottom:1px solid #ccc;margin-bottom:5px;padding-bottom:4px}
    header h1{font-size:12px;color:black}
    header p,.hbadge{color:#555;font-size:9px}
    .tabs,.toolbar,.legend{display:none!important}
    .panel{display:block!important}
    #panel-kisi{display:none!important}
    #panel-aylik{display:block!important}
    .twrap{border:1px solid #ccc;border-radius:0;overflow:visible}
    .mtable{font-size:7px;width:100%}
    .mtable thead th{background:#f1f5f9!important;color:#334155!important;padding:4px 2px;font-size:6.5px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .mtable thead th.th-left{color:#1e40af!important}
    .mtable tbody td{padding:3px 2px;border-color:#e2e8f0}
    .td-left{background:#f8fafc!important;color:#1e40af!important;font-size:7px;padding-left:4px!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .td-tatil{background:#fffbeb!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .td-today{background:#eff6ff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .pill{font-size:6.5px!important;padding:1px 4px!important;max-width:62px!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .pill[data-b="0"]{background:#dbeafe!important;color:#1d4ed8!important;border:1px solid #93c5fd!important}
    .pill[data-b="1"]{background:#d1fae5!important;color:#065f46!important;border:1px solid #6ee7b7!important}
    .pill[data-b="2"]{background:#ede9fe!important;color:#5b21b6!important;border:1px solid #c4b5fd!important}
    .pill[data-b="3"]{background:#fce7f3!important;color:#9d174d!important;border:1px solid #f9a8d4!important}
    .pill[data-b="4"]{background:#ffedd5!important;color:#9a3412!important;border:1px solid #fdba74!important}
    .pill[data-b="5"]{background:#fef9c3!important;color:#713f12!important;border:1px solid #fde047!important}
    .pill[data-b="6"]{background:#cffafe!important;color:#155e75!important;border:1px solid #67e8f9!important}
    .pill[data-b="7"]{background:#fee2e2!important;color:#991b1b!important;border:1px solid #fca5a5!important}
    .pill[data-b="8"]{background:#e0e7ff!important;color:#3730a3!important;border:1px solid #a5b4fc!important}
    .pill[data-b="9"]{background:#ccfbf1!important;color:#134e4a!important;border:1px solid #5eead4!important}
  }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">🛡</div>
  <div>
    <h1>NÖBET ÇİZELGESİ</h1>
    <p id="headerSub">Yükleniyor...</p>
  </div>
  <div class="hbadge" id="hbadge">⏳ veri yükleniyor</div>
</header>

<div class="tabs" id="tabBar" style="display:none">
  <button class="tab active" onclick="showTab('aylik',this)">📅 Aylık Çizelge</button>
  <button class="tab" onclick="showTab('kisi',this)">👤 Kişi Bazlı</button>
</div>

<!-- LOADING -->
<div id="loadingDiv" class="loading">
  <div class="spinner"></div>
  <p>Nöbet verileri yükleniyor...</p>
</div>

<!-- HATA -->
<div id="errorDiv" style="display:none" class="error-box">
  <h3>⚠ Veri Dosyası Bulunamadı</h3>
  <p>
    <code>nobet_data.json</code> dosyası bu sayfayla aynı klasörde olmalı.<br><br>
    GitHub deposuna hem <code>nobet_cizelgesi.html</code> hem de <code>nobet_data.json</code> dosyasını yükleyin.
  </p>
</div>

<!-- AYLIK ÇİZELGE -->
<div id="panel-aylik" class="panel" style="display:none">
  <div class="toolbar">
    <div class="nav">
      <button class="btn-nav" onclick="prevMonth()">←</button>
      <div class="month-label" id="monthLabel">—</div>
      <button class="btn-nav" onclick="nextMonth()">→</button>
    </div>
    <button class="btn btn-o btn-sm" onclick="goThisMonth()">Bu Ay</button>
    <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-o btn-sm" onclick="exportCSV()">↓ CSV</button>
      <button class="btn btn-o btn-sm" onclick="window.print()">🖨 Yazdır</button>
    </div>
  </div>
  <div class="legend" id="legend"></div>
  <div class="twrap">
    <table class="mtable"><thead id="mThead"></thead><tbody id="mTbody"></tbody></table>
  </div>
</div>

<!-- KİŞİ BAZLI -->
<div id="panel-kisi" class="panel" style="display:none">
  <div class="toolbar">
    <div class="nav">
      <button class="btn-nav" onclick="prevMonthK()">←</button>
      <div class="month-label" id="monthLabelK">—</div>
      <button class="btn-nav" onclick="nextMonthK()">→</button>
    </div>
    <button class="btn btn-o btn-sm" onclick="goThisMonthK()">Bu Ay</button>
    <input class="search-box" id="kSearch" placeholder="🔍 İsminizi arayın..." oninput="renderKisi()"/>
  </div>
  <div class="twrap">
    <table class="mtable"><thead id="kThead"></thead><tbody id="kTbody"></tbody></table>
  </div>
</div>

</div><!-- /app -->

<script>
// ── STATE ─────────────────────────────────────────────────────
let D = null; // JSON verisi
let monthOffset = 0;
let monthOffsetK = 0;

const DAY_SHORT = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
const MONTH_TR  = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const C = [
  {bg:'rgba(96,165,250,.18)',t:'#60a5fa',b:'rgba(96,165,250,.35)'},
  {bg:'rgba(52,211,153,.18)',t:'#34d399',b:'rgba(52,211,153,.35)'},
  {bg:'rgba(167,139,250,.18)',t:'#a78bfa',b:'rgba(167,139,250,.35)'},
  {bg:'rgba(244,114,182,.18)',t:'#f472b6',b:'rgba(244,114,182,.35)'},
  {bg:'rgba(251,146,60,.18)',t:'#fb923c',b:'rgba(251,146,60,.35)'},
  {bg:'rgba(250,204,21,.18)',t:'#facc15',b:'rgba(250,204,21,.35)'},
  {bg:'rgba(34,211,238,.18)',t:'#22d3ee',b:'rgba(34,211,238,.35)'},
  {bg:'rgba(248,113,113,.18)',t:'#f87171',b:'rgba(248,113,113,.35)'},
  {bg:'rgba(129,140,248,.18)',t:'#818cf8',b:'rgba(129,140,248,.35)'},
  {bg:'rgba(45,212,191,.18)',t:'#2dd4bf',b:'rgba(45,212,191,.35)'},
];

// ── VERİ YÜKLE ────────────────────────────────────────────────
window.onload = async () => {
  try {
    const res = await fetch('nobet_data.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    D = await res.json();
    D.startDate = new Date(D.baslamaTarihi + 'T00:00:00');
    // tatil tarihlerini Date'e çevir
    (D.tatiller || []).forEach(t => { t.pazartesiDate = new Date(t.pazartesi + 'T00:00:00'); });

    // Başlangıç ay offset'i → bugünün ayı
    const now = new Date();
    monthOffset  = (now.getFullYear()-D.startDate.getFullYear())*12+(now.getMonth()-D.startDate.getMonth());
    monthOffsetK = monthOffset;

    // UI'ı aç
    document.getElementById('loadingDiv').style.display = 'none';
    document.getElementById('tabBar').style.display = '';
    document.getElementById('panel-aylik').style.display = 'block';
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-aylik').classList.add('active');

    // Header
    const total = Object.values(D.gunNobetcileri).reduce((s,a)=>s+a.filter(x=>x).length,0);
    document.getElementById('headerSub').textContent = 'Haftada 1 gün nöbet · Haftalık bölge rotasyonu';
    document.getElementById('hbadge').textContent = `${total} nöbetçi · ${D.bolgeCount} bölge`;

    renderMonthly();
  } catch(e) {
    document.getElementById('loadingDiv').style.display = 'none';
    document.getElementById('errorDiv').style.display = 'block';
    console.error(e);
  }
};

// ── TABS ──────────────────────────────────────────────────────
function showTab(n, btn) {
  document.querySelectorAll('.panel').forEach(p=>{p.classList.remove('active');p.style.display='none';});
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const panel = document.getElementById('panel-'+n);
  panel.style.display = 'block';
  panel.classList.add('active');
  btn.classList.add('active');
  if(n==='aylik') renderMonthly();
  if(n==='kisi')  renderKisi();
}

// ── CORE ──────────────────────────────────────────────────────
function calWeekNum(date) {
  const s=new Date(D.startDate);s.setHours(0,0,0,0);
  const d=new Date(date);d.setHours(0,0,0,0);
  return Math.floor((d-s)/(7*86400000));
}
function isTatilWeek(cw) {
  const ws=addDays(D.startDate,cw*7);ws.setHours(0,0,0,0);
  for(const t of (D.tatiller||[])){
    const ts=new Date(t.pazartesiDate);ts.setHours(0,0,0,0);
    const te=addDays(ts,t.haftaSayisi*7-1);
    if(ws>=ts&&ws<=te)return true;
  }
  return false;
}
function tatilCountBefore(cw){
  let c=0;for(let w=0;w<cw;w++)if(isTatilWeek(w))c++;return c;
}
function rotWeekNum(date){
  const cw=calWeekNum(date);return cw-tatilCountBefore(cw);
}
function getBolge(slot,rw){
  return((slot+rw)%D.bolgeCount+D.bolgeCount)%D.bolgeCount;
}
function getSchedule(date){
  const d=new Date(date);d.setHours(0,0,0,0);
  const s=new Date(D.startDate);s.setHours(0,0,0,0);
  if(d<s)return[];
  const jsDay=d.getDay();
  const dow=jsDay===0?6:jsDay-1;
  if(dow>=D.workDays)return[];
  const cw=calWeekNum(d);
  if(isTatilWeek(cw))return null;
  const rw=rotWeekNum(d);
  const list=D.gunNobetcileri[String(dow)]||D.gunNobetcileri[dow]||[];
  return list.map((name,i)=>({name,bolgeIndex:getBolge(i,rw),slotIndex:i})).filter(x=>x.name);
}

// ── AYLIK ÇİZELGE ─────────────────────────────────────────────
function getMonthInfo(offset){
  const base=new Date(D.startDate.getFullYear(),D.startDate.getMonth()+offset,1);
  return{year:base.getFullYear(),month:base.getMonth()};
}
function renderMonthly(){
  if(!D)return;
  const{year,month}=getMonthInfo(monthOffset);
  document.getElementById('monthLabel').textContent=`${MONTH_TR[month]} ${year}`;
  const today=new Date();today.setHours(0,0,0,0);
  const dim=new Date(year,month+1,0).getDate();
  const days=[];for(let d=1;d<=dim;d++)days.push(new Date(year,month,d));

  // Legend
  let leg='';
  for(let b=0;b<D.bolgeCount;b++){
    const c=C[b%C.length];
    leg+=`<div class="leg-item"><span class="leg-dot" style="background:${c.t}"></span>${D.bolgeNames[b]}</div>`;
  }
  if(D.tatiller&&D.tatiller.length)
    leg+=`<div class="leg-item"><span class="leg-dot" style="background:var(--warn)"></span>Tatil</div>`;
  document.getElementById('legend').innerHTML=leg;

  // Thead
  let th='<tr><th class="th-left">BÖLGE</th>';
  days.forEach(day=>{
    const dow=day.getDay()===0?6:day.getDay()-1;
    const isWe=dow>=D.workDays;
    const isToday=day.getTime()===today.getTime();
    const cw=calWeekNum(day);
    const isTatil=!isWe&&cw>=0&&isTatilWeek(cw);
    const cls=isToday?'th-today':isTatil?'th-tatil':isWe?'th-we':'';
    th+=`<th class="${cls}" style="min-width:30px">
      <div style="font-size:11px;font-weight:600">${day.getDate()}</div>
      <div style="font-size:9px;opacity:.7">${DAY_SHORT[dow]}</div>
    </th>`;
  });
  th+='</tr>';
  document.getElementById('mThead').innerHTML=th;

  // Tbody
  let tb='';
  for(let b=0;b<D.bolgeCount;b++){
    const bc=C[b%C.length];
    tb+=`<tr><td class="td-left" style="color:${bc.t}">
      <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${bc.t};margin-right:6px"></span>${D.bolgeNames[b]}
    </td>`;
    days.forEach(day=>{
      const dow=day.getDay()===0?6:day.getDay()-1;
      const isWe=dow>=D.workDays;
      const isToday=day.getTime()===today.getTime();
      const tCls=isToday?' td-today':'';
      if(isWe){tb+=`<td class="td-we${tCls}"><span class="empty-dot">–</span></td>`;return;}
      const sch=getSchedule(day);
      if(sch===null){tb+=`<td class="td-tatil${tCls}"><span class="tatil-lbl">TAT</span></td>`;return;}
      const person=sch.find(x=>x.bolgeIndex===b);
      if(person){
        const fname=person.name.split(' ')[0];
        tb+=`<td class="${tCls}"><span class="pill" data-b="${b}" title="${person.name}"
          style="background:${bc.bg};color:${bc.t};border:1px solid ${bc.b}">${fname}</span></td>`;
      } else {
        tb+=`<td class="${tCls}"><span class="empty-dot">·</span></td>`;
      }
    });
    tb+='</tr>';
  }
  document.getElementById('mTbody').innerHTML=tb;
}
function prevMonth(){monthOffset--;renderMonthly();}
function nextMonth(){monthOffset++;renderMonthly();}
function goThisMonth(){
  const n=new Date();
  monthOffset=(n.getFullYear()-D.startDate.getFullYear())*12+(n.getMonth()-D.startDate.getMonth());
  renderMonthly();
}

// ── KİŞİ BAZLI ───────────────────────────────────────────────
function renderKisi(){
  if(!D)return;
  const{year,month}=getMonthInfo(monthOffsetK);
  document.getElementById('monthLabelK').textContent=`${MONTH_TR[month]} ${year}`;
  const today=new Date();today.setHours(0,0,0,0);
  const search=(document.getElementById('kSearch').value||'').toLowerCase().trim();
  const dim=new Date(year,month+1,0).getDate();
  const wdList=[];
  for(let d=1;d<=dim;d++){
    const day=new Date(year,month,d);
    const dow=day.getDay()===0?6:day.getDay()-1;
    if(dow<D.workDays)wdList.push({day,dow});
  }

  let th='<tr><th style="text-align:left;min-width:130px;padding-left:12px">NÖBETÇİ</th><th style="text-align:center;min-width:45px">Gün</th>';
  wdList.forEach(({day,dow})=>{
    const isToday=day.getTime()===today.getTime();
    const cw=calWeekNum(day);
    const isTatil=cw>=0&&isTatilWeek(cw);
    const cls=isToday?'th-today':isTatil?'th-tatil':'';
    th+=`<th class="${cls}" style="min-width:30px">
      <div style="font-size:11px;font-weight:600">${day.getDate()}</div>
      <div style="font-size:9px;opacity:.7">${DAY_SHORT[dow]}</div>
    </th>`;
  });
  th+='</tr>';

  const allP=[];
  for(let d=0;d<D.workDays;d++){
    const list=D.gunNobetcileri[String(d)]||D.gunNobetcileri[d]||[];
    list.forEach((name,slot)=>{
      if(name)allP.push({name,dow:d,slot});
    });
  }

  let tb='';
  allP.forEach(person=>{
    const isMatch=!search||person.name.toLowerCase().includes(search);
    const dc=C[person.dow%C.length];
    const rowStyle=isMatch&&search?'background:rgba(59,130,246,.06);':'';
    tb+=`<tr style="${rowStyle}">
      <td style="font-weight:500;white-space:nowrap;font-size:12px;padding-left:12px;${isMatch&&search?'color:var(--accent2)':''}">${person.name}</td>
      <td style="text-align:center"><span style="font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:10px;background:${dc.bg};color:${dc.t};border:1px solid ${dc.b}">${DAY_SHORT[person.dow]}</span></td>`;
    wdList.forEach(({day,dow})=>{
      const isToday=day.getTime()===today.getTime();
      const bg=isToday?'background:rgba(59,130,246,.05);':'';
      if(dow!==person.dow){tb+=`<td style="${bg}"><span class="empty-dot">·</span></td>`;return;}
      const sch=getSchedule(day);
      if(sch===null){tb+=`<td style="${bg}"><span class="tatil-lbl">TAT</span></td>`;return;}
      const entry=sch.find(x=>x.slotIndex===person.slot);
      if(entry){
        const bc=C[entry.bolgeIndex%C.length];
        const bname=D.bolgeNames[entry.bolgeIndex]||`B${entry.bolgeIndex+1}`;
        tb+=`<td style="text-align:center;${bg}"><span class="pill" data-b="${entry.bolgeIndex}" title="${bname}"
          style="background:${bc.bg};color:${bc.t};border:1px solid ${bc.b};font-size:10px">${bname}</span></td>`;
      } else {
        tb+=`<td style="${bg}"><span class="empty-dot">·</span></td>`;
      }
    });
    tb+='</tr>';
  });

  document.getElementById('kThead').innerHTML=th;
  document.getElementById('kTbody').innerHTML=tb||'<tr><td colspan="40" style="text-align:center;color:var(--text3);padding:30px;font-size:13px">İsim bulunamadı</td></tr>';
}
function prevMonthK(){monthOffsetK--;renderKisi();}
function nextMonthK(){monthOffsetK++;renderKisi();}
function goThisMonthK(){
  const n=new Date();
  monthOffsetK=(n.getFullYear()-D.startDate.getFullYear())*12+(n.getMonth()-D.startDate.getMonth());
  renderKisi();
}

// ── CSV ───────────────────────────────────────────────────────
function exportCSV(){
  if(!D)return;
  const{year,month}=getMonthInfo(monthOffset);
  const dim=new Date(year,month+1,0).getDate();
  const days=[];for(let d=1;d<=dim;d++)days.push(new Date(year,month,d));
  let csv='Bölge';
  days.forEach(day=>{
    const dow=day.getDay()===0?6:day.getDay()-1;
    if(dow<D.workDays)csv+=`,${day.getDate()} ${DAY_SHORT[dow]}`;
  });
  csv+='\n';
  for(let b=0;b<D.bolgeCount;b++){
    csv+=`"${D.bolgeNames[b]}"`;
    days.forEach(day=>{
      const dow=day.getDay()===0?6:day.getDay()-1;
      if(dow>=D.workDays)return;
      const sch=getSchedule(day);
      if(sch===null){csv+=',"TATİL"';return;}
      const p=sch.find(x=>x.bolgeIndex===b);
      csv+=p?`,"${p.name}"`:',—';
    });
    csv+='\n';
  }
  const bl=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(bl);
  a.download=`nobet_${MONTH_TR[month]}_${year}.csv`;
  a.click();
}

// ── UTILS ─────────────────────────────────────────────────────
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function p(n){return String(n).padStart(2,'0');}
function fmt(d){return`${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()}`;}
